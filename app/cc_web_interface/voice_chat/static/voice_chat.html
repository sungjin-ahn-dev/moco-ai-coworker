<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOCO Voice Chat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0F1117;color:#E2E4E9;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.container{max-width:480px;width:100%;padding:24px;text-align:center}
.logo{font-size:32px;font-weight:800;background:linear-gradient(135deg,#5B5FC7,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.subtitle{color:#6B7280;font-size:14px;margin-bottom:40px}
.mic-btn{width:120px;height:120px;border-radius:50%;border:none;cursor:pointer;font-size:48px;transition:all 0.3s;outline:none;position:relative}
.mic-btn.idle{background:linear-gradient(135deg,#5B5FC7,#8B5CF6);box-shadow:0 8px 32px rgba(91,95,199,0.3)}
.mic-btn.idle:hover{transform:scale(1.05);box-shadow:0 12px 40px rgba(91,95,199,0.4)}
.mic-btn.recording{background:linear-gradient(135deg,#EF4444,#F87171);box-shadow:0 8px 32px rgba(239,68,68,0.4);animation:pulse 1.5s infinite}
.mic-btn.processing{background:#374151;cursor:wait;opacity:0.7}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 20px rgba(239,68,68,0)}}
.status{margin-top:24px;font-size:14px;color:#9CA3AF;min-height:20px}
.status.error{color:#EF4444}
.chat-log{margin-top:32px;text-align:left;max-height:400px;overflow-y:auto;width:100%}
.chat-bubble{padding:12px 16px;border-radius:16px;margin-bottom:8px;font-size:14px;line-height:1.5;max-width:85%;word-break:break-word}
.chat-bubble.user{background:#1E293B;margin-left:auto;border-bottom-right-radius:4px}
.chat-bubble.ai{background:#5B5FC720;border:1px solid #5B5FC740;border-bottom-left-radius:4px}
.chat-bubble .label{font-size:10px;font-weight:600;text-transform:uppercase;color:#6B7280;margin-bottom:4px}
.hint{margin-top:16px;font-size:12px;color:#4B5563}
</style>
</head>
<body>
<div class="container">
  <div class="logo">MOCO Voice</div>
  <div class="subtitle">통화 시작을 누르면 연속 대화가 시작됩니다</div>

  <button class="mic-btn idle" id="micBtn" onclick="toggleSession()">📞</button>
  <div class="status" id="status">대기 중</div>

  <div class="chat-log" id="chatLog"></div>
  <div class="hint">💡 통화 시작 → 말하기 → 2초 침묵하면 자동 전송 → 응답 후 자동 녹음 반복 → 종료 버튼</div>
</div>

<script>
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let conversationContext = '';
let sessionActive = false;
let silenceTimer = null;
let analyser = null;

const micBtn = document.getElementById('micBtn');
const status = document.getElementById('status');
const chatLog = document.getElementById('chatLog');

async function toggleSession() {
  if (sessionActive) {
    await endSession();
  } else {
    sessionActive = true;
    micBtn.textContent = '⏹️';
    micBtn.className = 'mic-btn processing';
    status.textContent = '연결 중...';
    addBubble('상담원', '안녕하세요, 제품A 고객 지원센터입니다. 궁금하신 내용을 말씀해 주시면 도와드리겠습니다.', 'ai');

    // 안내 멘트 음성 재생
    try {
      const greetResp = await fetch('/voice-chat/greet', { method: 'POST' });
      if (greetResp.ok) {
        const blob = await greetResp.blob();
        const url = URL.createObjectURL(blob);
        const player = new Audio(url);
        player.onended = () => {
          URL.revokeObjectURL(url);
          micBtn.className = 'mic-btn recording';
          status.textContent = '말씀하세요...';
          startListening();
        };
        player.play();
        status.textContent = '🔊 안내 멘트 재생 중...';
      } else {
        micBtn.className = 'mic-btn recording';
        startListening();
      }
    } catch(e) {
      micBtn.className = 'mic-btn recording';
      startListening();
    }
  }
}

async function endSession() {
  sessionActive = false;
  if (isRecording) stopRecording(false);
  if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
  micBtn.textContent = '📞';
  micBtn.className = 'mic-btn idle';
  status.textContent = '통화 요약 전송 중...';
  addBubble('시스템', '통화가 종료되었습니다. 요약을 Slack에 전송합니다.', 'ai');

  // 대화 로그를 서버에 전송 → Slack 요약
  if (conversationContext.trim().length > 10) {
    try {
      await fetch('/voice-chat/end-session', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({conversation: conversationContext}),
      });
      addBubble('시스템', '✅ Slack에 통화 요약이 전송되었습니다.', 'ai');
    } catch(e) {
      addBubble('시스템', '⚠️ 요약 전송 실패', 'ai');
    }
  }
  conversationContext = '';
  status.textContent = '대기 중';
}

async function startListening() {
  if (!sessionActive) return;
  await startRecording();
  // 침묵 감지 시작
  detectSilence();
}

function detectSilence() {
  if (!recCtx || !analyser) return;
  const data = new Uint8Array(analyser.fftSize);
  let silenceStart = null;
  let speaking = false;

  function check() {
    if (!sessionActive || !isRecording) return;
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) sum += Math.abs(data[i] - 128);
    const avg = sum / data.length;

    if (avg > 3) {
      speaking = true;
      silenceStart = null;
      status.textContent = '🎙️ 듣고 있습니다...';
    } else if (speaking && !silenceStart) {
      silenceStart = Date.now();
    } else if (speaking && silenceStart && Date.now() - silenceStart > 2000) {
      // 2초 침묵 → 자동 전송
      speaking = false;
      silenceStart = null;
      stopRecording(true);
      return;
    }
    requestAnimationFrame(check);
  }
  check();
}

let recCtx = null;
let recSource = null;
let recWorklet = null;
let pcmChunks = [];

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1 } });
    recCtx = new AudioContext({ sampleRate: 16000 });
    recSource = recCtx.createMediaStreamSource(stream);

    // 침묵 감지용 analyser
    analyser = recCtx.createAnalyser();
    analyser.fftSize = 2048;
    recSource.connect(analyser);

    // AudioWorklet으로 PCM 캡처
    await recCtx.audioWorklet.addModule(URL.createObjectURL(new Blob([`
      class PCMProcessor extends AudioWorkletProcessor {
        process(inputs) {
          const input = inputs[0][0];
          if (input) this.port.postMessage(input);
          return true;
        }
      }
      registerProcessor('pcm-processor', PCMProcessor);
    `], { type: 'application/javascript' })));

    recWorklet = new AudioWorkletNode(recCtx, 'pcm-processor');
    pcmChunks = [];
    recWorklet.port.onmessage = (e) => pcmChunks.push(new Float32Array(e.data));
    recSource.connect(recWorklet);
    recWorklet.connect(recCtx.destination);

    isRecording = true;
    micBtn.className = 'mic-btn recording';
    micBtn.textContent = '⏹️';
    status.textContent = '녹음 중... 다시 누르면 전송';
    status.className = 'status';
  } catch (err) {
    console.error(err);
    status.textContent = '마이크 접근 권한이 필요합니다';
    status.className = 'status error';
  }
}

function stopRecording(autoSend = true) {
  if (recWorklet) { recWorklet.disconnect(); recWorklet = null; }
  if (recSource) { recSource.mediaStream.getTracks().forEach(t => t.stop()); recSource.disconnect(); recSource = null; }
  analyser = null;
  const sampleRate = recCtx ? recCtx.sampleRate : 16000;
  if (recCtx) { recCtx.close(); recCtx = null; }
  isRecording = false;
  if (autoSend && pcmChunks.length > 0) {
    status.textContent = '처리 중...';
    processAudio(sampleRate);
  }
}

function float32ToWav(samples, sampleRate) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o+i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4,36+samples.length*2,true); w(8,'WAVE');
  w(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,sampleRate,true); v.setUint32(28,sampleRate*2,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true);
  w(36,'data'); v.setUint32(40,samples.length*2,true);
  for (let i=0;i<samples.length;i++) {
    const s=Math.max(-1,Math.min(1,samples[i]));
    v.setInt16(44+i*2, s<0?s*0x8000:s*0x7FFF, true);
  }
  return new Blob([v], {type:'audio/wav'});
}

async function processAudio(sampleRate) {
  const total = pcmChunks.reduce((s,b) => s+b.length, 0);
  const merged = new Float32Array(total);
  let off = 0;
  for (const c of pcmChunks) { merged.set(c, off); off += c.length; }

  const audioBlob = float32ToWav(merged, sampleRate);
  console.log('WAV blob size:', audioBlob.size, 'sampleRate:', sampleRate);

  const formData = new FormData();
  formData.append('audio', audioBlob, 'recording.wav');
  formData.append('context', conversationContext);

  // 대기 BGM — Bella 안내 멘트 + 우아한 피아노 아르페지오
  const bgmCtx = new AudioContext();
  const bgmGain = bgmCtx.createGain();
  bgmGain.gain.value = 0.5;
  bgmGain.connect(bgmCtx.destination);

  // Bella "잠시만 기다려주세요" 멘트 재생
  const holdMsg = new Audio('/voice-chat/static/hold_message.mp3');
  holdMsg.volume = 0.8;
  holdMsg.play().catch(()=>{});

  // 피아노 아르페지오 (C major 7th → Am → F → G)
  const chords = [
    [261.6, 329.6, 392, 493.9],  // Cmaj7
    [220, 261.6, 329.6, 440],    // Am
    [174.6, 220, 261.6, 349.2],  // F
    [196, 246.9, 293.7, 392],    // G
  ];
  let chordIdx = 0;
  let noteInChord = 0;
  function playPianoNote() {
    const chord = chords[chordIdx % chords.length];
    const freq = chord[noteInChord % chord.length];
    const osc = bgmCtx.createOscillator();
    const env = bgmCtx.createGain();
    // 피아노 느낌: 사인파 + 약간의 하모닉
    osc.type = 'sine';
    osc.frequency.value = freq;
    env.gain.setValueAtTime(0.4, bgmCtx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.01, bgmCtx.currentTime + 1.2);
    osc.connect(env);
    env.connect(bgmGain);
    osc.start();
    osc.stop(bgmCtx.currentTime + 1.3);
    noteInChord++;
    if (noteInChord >= chord.length) { noteInChord = 0; chordIdx++; }
  }
  // 멘트 끝난 후 BGM 시작 (2초 후)
  setTimeout(() => { playPianoNote(); }, 2000);
  const bgmInterval = setInterval(playPianoNote, 400);
  status.textContent = '🎵 응답 준비 중...';

  try {
    const resp = await fetch('/voice-chat/process', { method: 'POST', body: formData });

    // BGM 정지
    clearInterval(bgmInterval);
    bgmCtx.close();

    const contentType = resp.headers.get('Content-Type') || '';

    if (contentType.includes('application/json')) {
      const err = await resp.json();
      throw new Error(err.error || 'Processing failed');
    }

    if (!resp.ok) {
      throw new Error('서버 오류');
    }

    const userText = decodeHeader(resp.headers.get('X-User-Text')) || '(인식 실패)';
    const aiText = decodeHeader(resp.headers.get('X-AI-Text')) || '(응답 실패)';

    addBubble('나', userText, 'user');
    addBubble('MOCO', aiText, 'ai');

    conversationContext += `사용자: ${userText}\nMOCO: ${aiText}\n`;
    if (conversationContext.length > 2000) {
      conversationContext = conversationContext.slice(-1500);
    }

    const audioBlob = await resp.blob();
    const audioUrl = URL.createObjectURL(audioBlob);
    const player = new Audio(audioUrl);
    player.onended = () => {
      URL.revokeObjectURL(audioUrl);
      if (sessionActive) {
        // 자동으로 다시 녹음 시작
        micBtn.className = 'mic-btn recording';
        micBtn.textContent = '⏹️';
        startListening();
      } else {
        micBtn.className = 'mic-btn idle';
        micBtn.textContent = '📞';
        status.textContent = '대기 중';
      }
    };
    player.play();

    status.textContent = '🔊 응답 재생 중...';

  } catch (err) {
    // BGM 정지 (에러 시에도)
    try { clearInterval(bgmInterval); bgmCtx.close(); } catch(e) {}
    status.textContent = err.message;
    status.className = 'status error';
    if (sessionActive) {
      // 에러여도 세션 유지 — 다시 녹음
      setTimeout(() => {
        status.className = 'status';
        micBtn.className = 'mic-btn recording';
        micBtn.textContent = '⏹️';
        startListening();
      }, 2000);
    } else {
      micBtn.className = 'mic-btn idle';
      micBtn.textContent = '📞';
    }
  }
}

function decodeHeader(val) {
  if (!val) return null;
  try {
    const bytes = new Uint8Array([...val].map(c => c.charCodeAt(0)));
    return new TextDecoder('utf-8').decode(bytes);
  } catch {
    return val;
  }
}

function addBubble(label, text, type) {
  const div = document.createElement('div');
  div.className = `chat-bubble ${type}`;
  div.innerHTML = `<div class="label">${label}</div>${text}`;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}
</script>
</body>
</html>
