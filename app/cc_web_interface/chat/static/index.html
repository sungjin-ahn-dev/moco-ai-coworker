<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOCO Chat</title>
<link rel="stylesheet" href="/chat/static/chat.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css">
<link rel="icon" href="data:,">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <button class="new-chat-btn" id="new-chat-btn">
        <span>+</span> 새 대화
      </button>
    </div>
    <nav class="conv-list" id="conv-list"></nav>
    <div class="sidebar-bottom">
      <div class="user-pill">
        <div class="avatar" id="user-avatar"></div>
        <div class="user-meta">
          <div class="user-name">{{USER_NAME}}</div>
          <div class="user-email">{{USER_EMAIL}}</div>
        </div>
      </div>
      <a class="logout" href="/chat/logout">로그아웃</a>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="icon-btn sidebar-toggle" id="sidebar-toggle" title="사이드바 토글">☰</button>
      <div class="title" id="conv-title">MOCO Chat</div>
    </header>

    <section class="messages-wrap">
      <section class="messages" id="messages">
        <div class="empty-state" id="empty-state">
          <div class="empty-logo">M</div>
          <h1>안녕하세요, {{USER_NAME}}님</h1>
          <p>무엇을 도와드릴까요? Slack에서 쓰던 MOCO를 그대로 웹에서 쓸 수 있어요.</p>
          <div class="suggestions-section-title">업무 바로가기</div>
          <div class="suggestions">
            <button class="suggestion" data-prompt="오늘 내 캘린더 일정 정리해줘">
              <span class="suggestion-icon">📅</span>
              <span class="suggestion-text">오늘 일정 정리</span>
            </button>
            <button class="suggestion" data-prompt="최근 받은 이메일 중 답장 필요한 것 알려줘">
              <span class="suggestion-icon">📧</span>
              <span class="suggestion-text">이메일 정리</span>
            </button>
            <button class="suggestion" data-prompt="이번주 내 ClickUp 태스크 보여줘">
              <span class="suggestion-icon">✅</span>
              <span class="suggestion-text">내 태스크</span>
            </button>
            <button class="suggestion" data-prompt="Google Drive에서 최근 작업한 문서 찾아줘">
              <span class="suggestion-icon">📂</span>
              <span class="suggestion-text">최근 문서</span>
            </button>
          </div>

          <div class="agents-section">
            <div class="agents-section-title">전문 에이전트</div>
            <div class="agent-cards">
              <button class="agent-card" data-agent="atticus">
                <span class="agent-card-icon">⚖️</span>
                <div class="agent-card-body">
                  <div class="agent-card-name">Atticus</div>
                  <div class="agent-card-desc">법령·계약·RA 1차 자문</div>
                </div>
                <span class="agent-card-arrow">→</span>
              </button>
              <button class="agent-card" data-agent="ra_expert">
                <span class="agent-card-icon">🏥</span>
                <div class="agent-card-body">
                  <div class="agent-card-name">식약처 RA 전문가</div>
                  <div class="agent-card-desc">디지털의료기기 인허가 심화</div>
                </div>
                <span class="agent-card-arrow">→</span>
              </button>
            </div>
          </div>
        </div>
      </section>
      <button class="scroll-bottom-btn" id="scroll-bottom-btn" title="맨 아래로" aria-label="맨 아래로">↓</button>
    </section>

    <footer class="composer">
      <div class="composer-inner">
        <div class="pending-files" id="pending-files" hidden></div>
        <textarea id="input" rows="1" placeholder="MOCO에게 메시지 보내기..."></textarea>
        <div class="composer-actions">
          <button id="attach-btn" class="attach-btn" type="button" title="파일 첨부" aria-label="파일 첨부">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
          <input type="file" id="file-input" multiple hidden>
          <div class="composer-spacer"></div>
          <button id="send-btn" class="send-btn" title="보내기" aria-label="보내기">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
          </button>
        </div>
      </div>
      <div class="composer-hint">Enter 전송 · Shift+Enter 줄바꿈</div>
    </footer>
  </main>

  <!-- 에이전트 이용해보기 모달 -->
  <div class="modal-backdrop" id="agent-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="agent-modal-title">
      <div class="modal-header">
        <div>
          <div class="modal-eyebrow">에이전트 이용해보기</div>
          <h2 class="modal-title" id="agent-modal-title">에이전트</h2>
        </div>
        <button class="modal-close" id="agent-modal-close" aria-label="닫기">×</button>
      </div>
      <div class="modal-body">
        <p class="modal-desc" id="agent-modal-desc"></p>
        <div class="modal-section-title">예시 질문</div>
        <div class="modal-examples" id="agent-modal-examples"></div>
        <div class="modal-divider"></div>
        <div class="modal-section-title">직접 질문하기</div>
        <textarea class="modal-input" id="agent-modal-input" rows="3" placeholder="에이전트에게 보낼 질문을 입력하세요..."></textarea>
        <div class="modal-actions">
          <button class="modal-btn-secondary" id="agent-modal-cancel">취소</button>
          <button class="modal-btn-primary" id="agent-modal-submit">에이전트에게 보내기</button>
        </div>
      </div>
    </div>
  </div>

<script>
window.USER_NAME = "{{USER_NAME}}";
window.USER_EMAIL = "{{USER_EMAIL}}";
window.USER_AVATAR = "{{USER_AVATAR}}";
</script>
<script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/common.min.js"></script>
<script src="/chat/static/chat.js"></script>
</body>
</html>
