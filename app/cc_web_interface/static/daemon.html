<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MOCO Daemon</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F1117;color:#E2E4E9;min-height:100vh}
.header{padding:16px 24px;background:linear-gradient(135deg,#1E1B4B,#312E81);display:flex;align-items:center;gap:12px}
.header .logo{width:36px;height:36px;background:rgba(255,255,255,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
.header h1{font-size:18px;font-weight:700;color:#fff}
.header .uptime{margin-left:auto;font-size:12px;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.1);padding:4px 12px;border-radius:8px}
.tabs{display:flex;gap:2px;padding:8px 24px 0;background:#13151C;border-bottom:1px solid #1E2028;overflow-x:auto}
.tab{padding:8px 16px;font-size:12px;font-weight:600;color:#6B7280;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap}
.tab:hover{color:#A5B4FC}
.tab.active{color:#818CF8;border-bottom-color:#818CF8}
.content{padding:16px 24px}
.panel{display:none}
.panel.active{display:block}

/* KPI Grid */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-8{grid-template-columns:repeat(4,1fr)}
.kpi{background:#1A1D26;border-radius:10px;padding:14px;border:1px solid #2D3039}
.kpi .label{font-size:9px;color:#6B7280;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.kpi .value{font-size:24px;font-weight:800;margin-top:3px}
.kpi .sub{font-size:10px;color:#6B7280;margin-top:2px}

/* Cards */
.card{background:#1A1D26;border-radius:10px;padding:14px;border:1px solid #2D3039;margin-bottom:10px}
.card h3{font-size:12px;font-weight:700;color:#A5B4FC;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}

/* Resources */
.resource{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;margin:3px 0;background:#13151C;font-size:12px}
.resource .name{flex:1;font-weight:500}
.state{font-size:9px;padding:2px 7px;border-radius:5px;font-weight:700}
.state-active{background:#065F46;color:#34D399}
.state-connected{background:#1E3A5F;color:#60A5FA}
.state-error{background:#7F1D1D;color:#FCA5A5}

/* Events/Logs */
.event{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #1E2028;font-size:11px}
.event .time{color:#6B7280;width:130px;flex-shrink:0}
.event .type{font-weight:600;width:140px;flex-shrink:0}
.event .data{color:#9CA3AF;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Controls */
.controls{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.btn{background:#2D3039;border:none;color:#9CA3AF;padding:6px 14px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600}
.btn:hover{background:#3D4049;color:#fff}
.btn-primary{background:#4F46E5;color:#fff}
.btn-primary:hover{background:#4338CA}
input[type=date]{background:#1A1D26;border:1px solid #2D3039;color:#E2E4E9;padding:5px 10px;border-radius:6px;font-size:11px}

/* Chart */
.chart-bar{display:flex;align-items:flex-end;gap:3px;height:100px;padding:8px 0}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.chart-col .bar{width:100%;background:#4F46E5;border-radius:3px 3px 0 0;min-height:2px;transition:height 0.3s}
.chart-col .lbl{font-size:8px;color:#6B7280}
.chart-col .val{font-size:9px;color:#A5B4FC;font-weight:600}

/* Log stream */
.log-stream{background:#0D0F14;border-radius:8px;padding:10px;font-family:monospace;font-size:10px;color:#6B7280;max-height:300px;overflow-y:auto;line-height:1.6;white-space:pre-wrap;word-break:break-all}
.log-stream .err{color:#F87171}
.log-stream .warn{color:#FBBF24}
.log-stream .info{color:#60A5FA}

/* Toggle */
.toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:#6B7280}
.toggle input{accent-color:#4F46E5}

.green{color:#34D399}.blue{color:#60A5FA}.purple{color:#818CF8}.red{color:#F87171}.yellow{color:#FBBF24}

@media(max-width:768px){.grid{grid-template-columns:repeat(2,1fr)}.grid-8{grid-template-columns:repeat(2,1fr)}}
</style></head><body>
<div class="header">
  <div class="logo">M</div>
  <h1>MOCO Daemon</h1>
  <div class="uptime" id="uptime">-</div>
</div>
<div class="tabs">
  <div class="tab active" onclick="showTab('status')">Status</div>
  <div class="tab" onclick="showTab('resources')">Resources</div>
  <div class="tab" onclick="showTab('settings')">Settings</div>
  <div class="tab" onclick="showTab('memory')">Memory</div>
  <div class="tab" onclick="showTab('crm')">CRM</div>
  <div class="tab" onclick="showTab('aicc')">AICC</div>
  <div class="tab" onclick="showTab('events')">Events</div>
  <div class="tab" onclick="showTab('logs')">Run Logs</div>
  <div class="tab" onclick="showTab('console')">Console</div>
</div>
<div class="content">

<!-- Status -->
<div class="panel active" id="panel-status">
  <!-- Period selector -->
  <div class="controls" style="margin-bottom:14px">
    <button class="btn btn-primary" id="btn-today" onclick="setPeriod('today')">Today</button>
    <button class="btn" id="btn-week" onclick="setPeriod('week')">Week</button>
    <button class="btn" id="btn-month" onclick="setPeriod('month')">Month</button>
    <span style="color:#3D4049;margin:0 4px">|</span>
    <input type="date" id="stat-from" style="font-size:10px">
    <span style="color:#6B7280;font-size:10px">~</span>
    <input type="date" id="stat-to" style="font-size:10px">
    <button class="btn" onclick="setPeriod('custom')">Apply</button>
    <span id="period-label" style="margin-left:auto;font-size:11px;color:#6B7280"></span>
  </div>
  <div class="grid" id="kpis"></div>
  <div class="grid grid-3">
    <div class="card"><h3>Status</h3><div style="height:160px;display:flex;align-items:center;justify-content:center"><canvas id="chartDonut"></canvas></div></div>
    <div class="card"><h3>User Activity</h3><div style="height:160px"><canvas id="chartBar"></canvas></div></div>
    <div class="card"><h3>Avg Response Time</h3><div id="avg-time" style="text-align:center;padding:30px"><div class="value" style="font-size:42px;font-weight:800;color:#818CF8">-</div><div class="sub" style="color:#6B7280;margin-top:4px">seconds</div></div></div>
  </div>
  <div class="card" id="trend-card" style="display:none"><h3>Daily Trend</h3><div style="height:180px"><canvas id="chartTrend"></canvas></div></div>
  <div class="card" id="resource-summary"></div>
</div>

<!-- Resources -->
<div class="panel" id="panel-resources"><div id="resource-list"></div></div>

<!-- Settings -->
<div class="panel" id="panel-settings"><div class="card" id="settings-content">Loading...</div></div>

<!-- Memory -->
<div class="panel" id="panel-memory">
  <div class="grid" id="memory-kpis"></div>
  <div class="card" id="memory-users">Loading...</div>
</div>

<!-- CRM -->
<div class="panel" id="panel-crm">
  <div class="grid grid-8" id="crm-kpis"></div>
</div>

<!-- AICC -->
<div class="panel" id="panel-aicc">
  <div class="grid" id="aicc-kpis"></div>
</div>

<!-- Events -->
<div class="panel" id="panel-events">
  <div class="controls">
    <h3 style="font-size:13px;font-weight:700;flex:1">Daemon Events</h3>
    <button class="btn" onclick="loadEvents()">Refresh</button>
  </div>
  <div class="card" id="event-list" style="max-height:500px;overflow-y:auto"></div>
</div>

<!-- Run Logs -->
<div class="panel" id="panel-logs">
  <div class="controls">
    <h3 style="font-size:13px;font-weight:700">Run Logs</h3>
    <input type="date" id="log-from" onchange="loadLogs()">
    <span style="color:#6B7280;font-size:11px">~</span>
    <input type="date" id="log-to" onchange="loadLogs()">
    <button class="btn" onclick="loadLogs()">Apply</button>
    <button class="btn" onclick="loadLogs()" style="margin-left:auto">Refresh</button>
  </div>
  <div class="card" id="log-list" style="max-height:500px;overflow-y:auto"></div>
</div>

<!-- Console -->
<div class="panel" id="panel-console">
  <div class="controls">
    <h3 style="font-size:13px;font-weight:700;flex:1">Server Console</h3>
    <label class="toggle"><input type="checkbox" id="auto-scroll" checked> Auto-scroll</label>
    <button class="btn" onclick="loadConsole()">Refresh</button>
  </div>
  <div class="log-stream" id="console-log">Loading server logs...</div>
</div>

</div>
<script>
// Date defaults
const today = new Date().toISOString().slice(0,10);
const weekAgo = new Date(Date.now()-7*86400000).toISOString().slice(0,10);
const monthAgo = new Date(Date.now()-30*86400000).toISOString().slice(0,10);
document.getElementById('log-from').value = weekAgo;
document.getElementById('log-to').value = today;
document.getElementById('stat-from').value = today;
document.getElementById('stat-to').value = today;

let currentPeriod = 'today';

function setPeriod(p){
  currentPeriod = p;
  document.querySelectorAll('#panel-status .btn').forEach(b=>b.classList.remove('btn-primary'));
  const btnId = 'btn-'+p;
  const btn = document.getElementById(btnId);
  if(btn) btn.classList.add('btn-primary');

  if(p==='today'){
    document.getElementById('stat-from').value=today;
    document.getElementById('stat-to').value=today;
  }else if(p==='week'){
    document.getElementById('stat-from').value=weekAgo;
    document.getElementById('stat-to').value=today;
  }else if(p==='month'){
    document.getElementById('stat-from').value=monthAgo;
    document.getElementById('stat-to').value=today;
  }
  loadStatusWithPeriod();
}

function showTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  const loaders={events:loadEvents,logs:loadLogs,resources:loadResources,settings:loadSettings,memory:loadMemory,crm:loadCRM,aicc:loadAICC,console:loadConsole};
  if(loaders[name]) loaders[name]();
}

function renderDonut(stats){
  const ctx=document.getElementById('chartDonut');if(!ctx||typeof Chart==='undefined')return;
  if(window._chartDonut)window._chartDonut.destroy();
  const bs=stats.by_state||{};if(!Object.keys(bs).length)bs['No data']=1;
  const cl={'completed':'#34D399','error':'#F87171','timeout':'#FBBF24','No data':'#2D3039'};
  window._chartDonut=new Chart(ctx,{type:'doughnut',data:{labels:Object.keys(bs),datasets:[{data:Object.values(bs),backgroundColor:Object.keys(bs).map(k=>cl[k]||'#818CF8'),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:'#9CA3AF',font:{size:9},padding:6,usePointStyle:true}},tooltip:{backgroundColor:'#1A1D26',borderColor:'#2D3039',borderWidth:1,cornerRadius:6}}}});
}
function renderBar(stats){
  const ctx=document.getElementById('chartBar');if(!ctx||typeof Chart==='undefined')return;
  if(window._chartBar)window._chartBar.destroy();
  const bu=stats.by_user||{};
  window._chartBar=new Chart(ctx,{type:'bar',data:{labels:Object.keys(bu),datasets:[{label:'Runs',data:Object.values(bu),backgroundColor:'#818CF8',borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6B7280',font:{size:9}},grid:{display:false}},y:{ticks:{color:'#6B7280',font:{size:9}},grid:{color:'#1E2028'}}}}});
}
function renderTrend(daily){
  const ctx=document.getElementById('chartTrend');if(!ctx||typeof Chart==='undefined')return;
  if(window._chartTrend)window._chartTrend.destroy();
  const labels=Object.keys(daily).map(d=>d.substring(5));
  const comp=Object.values(daily).map(d=>d.completed);
  const errs=Object.values(daily).map(d=>d.error);
  window._chartTrend=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'Completed',data:comp,borderColor:'#34D399',backgroundColor:'rgba(52,211,153,0.1)',fill:true,tension:0.3,pointRadius:3},{label:'Errors',data:errs,borderColor:'#F87171',backgroundColor:'rgba(248,113,113,0.1)',fill:true,tension:0.3,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#9CA3AF',font:{size:9},padding:8,usePointStyle:true}}},scales:{x:{ticks:{color:'#6B7280',font:{size:9}},grid:{display:false}},y:{ticks:{color:'#6B7280',font:{size:9}},grid:{color:'#1E2028'}}}}});
}

async function loadStatusWithPeriod(){
  const from=document.getElementById('stat-from').value;
  const to=document.getElementById('stat-to').value;
  let p=currentPeriod;
  if(p==='custom') p=`${from}~${to}`;

  const sr=await fetch(`/daemon/dashboard-data?period=${p}`);
  const d=await sr.json();

  document.getElementById('period-label').textContent=`${d.startDate} ~ ${d.endDate} | ${d.totalTasks} tasks | ${d.users?.length||0} users`;

  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="label">Total Tasks</div><div class="value blue">${d.totalTasks}</div></div>
    <div class="kpi"><div class="label">Success</div><div class="value green">${d.totalSuccess}</div><div class="sub">${d.successRate}%</div></div>
    <div class="kpi"><div class="label">Failed</div><div class="value ${d.totalFail>0?'red':'green'}">${d.totalFail}</div></div>
    <div class="kpi"><div class="label">Active Now</div><div class="value purple">${d.activeSessions||0}</div><div class="sub">${d.totalLanes||0} lanes</div></div>`;

  // Donut from real data
  renderDonut({by_state:{completed:d.totalSuccess,error:d.totalFail,pending:d.totalPending}});
  // Bar from real users
  const byUser={};(d.users||[]).forEach(u=>{byUser[u.userName]=u.total;});
  renderBar({by_user:byUser});
  // Avg time placeholder
  document.getElementById('avg-time').querySelector('.value').textContent=d.totalTasks?Math.round(d.totalTasks/(d.users?.length||1)):'0';
  document.getElementById('avg-time').querySelector('.sub').textContent='tasks/user';

  // Trend
  if(currentPeriod!=='today'&&d.dailyBreakdown?.length>1){
    document.getElementById('trend-card').style.display='';
    const daily={};d.dailyBreakdown.forEach(b=>{daily[b.date]={completed:b.success,error:b.fail};});
    renderTrend(daily);
  }else{document.getElementById('trend-card').style.display='none';}
}

async function loadStatus(){
  const r=await fetch('/daemon/status');const d=await r.json();
  document.getElementById('uptime').textContent='Uptime: '+d.uptime;
  let summary='<h3>Overview</h3>';
  for(const[type,info]of Object.entries(d.resources||{})){
    summary+=`<div class="resource"><span>${type==='mcp'?'🔧':type==='channel'?'💬':'📡'}</span><span class="name">${type}</span><span class="state state-active">${info.active} active</span>${info.error?'<span class="state state-error">'+info.error+' err</span>':''}<span style="color:#4B5563;font-size:10px;margin-left:auto">${info.total}</span></div>`;
  }
  document.getElementById('resource-summary').innerHTML=summary;
  loadStatusWithPeriod();
}

async function loadResources(){
  const r=await fetch('/daemon/resources');const d=await r.json();
  let html='';
  const groups={};
  (d.resources||[]).forEach(r=>{if(!groups[r.type])groups[r.type]=[];groups[r.type].push(r);});
  for(const[type,items]of Object.entries(groups)){
    html+=`<div class="card"><h3>${type==='mcp'?'🔧 MCP Servers':type==='channel'?'💬 Channels':'📡 '+type} (${items.length})</h3>`;
    items.forEach(r=>{
      const sc=r.state==='active'||r.state==='connected'?'state-active':r.state==='error'?'state-error':'state-connected';
      html+=`<div class="resource"><span>${type==='mcp'?'🔧':'💬'}</span><span class="name">${r.name}</span><span class="state ${sc}">${r.state}</span><span style="color:#4B5563;font-size:9px;margin-left:auto">${r.updated_at}</span></div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('resource-list').innerHTML=html||'<div class="card">No resources</div>';
}

async function loadSettings(){
  const r=await fetch('/daemon/settings');const d=await r.json();
  let html='<h3>⚙️ Configuration</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">';
  for(const[key,val]of Object.entries(d)){
    const isBool=typeof val==='boolean';
    html+=`<div class="resource"><span>${isBool?(val?'🟢':'⚫'):'⚙️'}</span><span class="name">${key.replace(/_/g,' ')}</span><span class="state ${isBool?(val?'state-active':''):'state-connected'}">${val}</span></div>`;
  }
  document.getElementById('settings-content').innerHTML=html+'</div>';
}

async function loadMemory(){
  const r=await fetch('/daemon/memory-stats');const d=await r.json();
  document.getElementById('memory-kpis').innerHTML=`
    <div class="kpi"><div class="label">Users</div><div class="value blue">${d.total_users}</div></div>
    <div class="kpi"><div class="label">Files</div><div class="value purple">${d.total_files}</div></div>
    <div class="kpi"><div class="label">Avg/User</div><div class="value green">${d.total_users?Math.round(d.total_files/d.total_users):0}</div></div>
    <div class="kpi"><div class="label">Index</div><div class="value green" style="font-size:16px">JSON</div></div>`;
  let html='<h3>👤 Memory by User</h3>';
  (d.users||[]).forEach(u=>{
    const cats=Object.entries(u.categories||{}).map(([k,v])=>k+':'+v).join(', ');
    html+=`<div class="resource"><span>👤</span><span class="name">${u.user_id}</span><span style="color:#4B5563;font-size:9px;flex:1;text-align:right;margin-right:6px">${cats}</span><span class="state state-active">${u.files}</span></div>`;
  });
  document.getElementById('memory-users').innerHTML=html;
}

async function loadCRM(){
  const r=await fetch('/daemon/crm-stats');const d=await r.json();const t=d.tables||{};
  document.getElementById('crm-kpis').innerHTML=`
    <div class="kpi"><div class="label">Companies</div><div class="value blue">${t.companies||0}</div></div>
    <div class="kpi"><div class="label">Contacts</div><div class="value purple">${t.contacts||0}</div></div>
    <div class="kpi"><div class="label">Prescriptions</div><div class="value green">${t.prescriptions||0}</div></div>
    <div class="kpi"><div class="label">Listings</div><div class="value yellow">${t.product_listings||0}</div></div>
    <div class="kpi"><div class="label">Sales</div><div class="value green">${t.sales_transactions||0}</div></div>
    <div class="kpi"><div class="label">Activities</div><div class="value blue">${t.activities||0}</div></div>
    <div class="kpi"><div class="label">Latest Rx</div><div class="value" style="font-size:13px;color:#9CA3AF">${(d.latest_prescription||'').substring(0,10)}</div></div>
    <div class="kpi"><div class="label">Latest Activity</div><div class="value" style="font-size:13px;color:#9CA3AF">${(d.latest_activity||'').substring(0,10)}</div></div>`;
}

async function loadAICC(){
  const r=await fetch('/daemon/aicc-status');const d=await r.json();
  document.getElementById('aicc-kpis').innerHTML=`
    <div class="kpi"><div class="label">Phone</div><div class="value" style="font-size:16px;color:#60A5FA">${d.phone_number}</div></div>
    <div class="kpi"><div class="label">Provider</div><div class="value" style="font-size:16px;color:#34D399">${d.provider}</div></div>
    <div class="kpi"><div class="label">Model</div><div class="value" style="font-size:12px;color:#818CF8">${d.model}</div></div>
    <div class="kpi"><div class="label">Active Calls</div><div class="value ${d.active_calls>0?'green':'blue'}">${d.active_calls}</div></div>`;
}

async function loadEvents(){
  const r=await fetch('/daemon/events?limit=50');const d=await r.json();
  let html='';
  (d.events||[]).reverse().forEach(e=>{
    const c=e.event?.includes('error')?'red':e.event?.includes('started')?'green':'purple';
    html+=`<div class="event"><span class="time">${e.time}</span><span class="type ${c}">${e.event}</span><span class="data">${JSON.stringify(e.data||{})}</span></div>`;
  });
  document.getElementById('event-list').innerHTML=html||'No events';
}

async function loadLogs(){
  const r=await fetch('/run-logs?limit=100');const d=await r.json();
  const from=document.getElementById('log-from').value;
  const to=document.getElementById('log-to').value;
  let logs=(d.logs||[]).filter(l=>{
    if(!l.created_at) return true;
    const date=l.created_at.substring(0,10);
    return(!from||date>=from)&&(!to||date<=to);
  });
  let html='';
  logs.reverse().forEach(l=>{
    const sc=l.state==='completed'?'green':l.state==='error'?'red':'yellow';
    html+=`<div class="event"><span class="time">${l.created_at}</span><span class="type">${l.type}</span><span class="data"><span class="${sc}">${l.state}</span> | ${l.user_name||'-'} | ${l.elapsed_seconds}s | ${(l.prompt||'').substring(0,60)}</span></div>`;
  });
  document.getElementById('log-list').innerHTML=html||'No logs';
}

async function loadConsole(){
  // 서버 로그 파일 읽기 (최근 100줄)
  try{
    const r=await fetch('/daemon/console-log');const d=await r.json();
    const el=document.getElementById('console-log');
    el.innerHTML=(d.lines||[]).map(l=>{
      if(l.includes('ERROR')) return `<span class="err">${esc(l)}</span>`;
      if(l.includes('WARNING')) return `<span class="warn">${esc(l)}</span>`;
      if(l.includes('INFO')) return `<span class="info">${esc(l)}</span>`;
      return esc(l);
    }).join('\n');
    if(document.getElementById('auto-scroll').checked) el.scrollTop=el.scrollHeight;
  }catch(e){
    document.getElementById('console-log').textContent='Console log not available';
  }
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
